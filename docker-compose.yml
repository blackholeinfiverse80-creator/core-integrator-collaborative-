# Core Integrator Docker Compose Configuration
# Multi-container setup for complete system deployment

version: '3.8'

services:
  # Noopur AI Backend Service
  noopur:
    image: python:3.11-slim
    container_name: noopur-service
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
    volumes:
      - noopur_data:/app/instance
    networks:
      - integrator-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Mock CreatorCore Service
  mock-creatorcore:
    build:
      context: .
      dockerfile: Dockerfile.mock
    container_name: mock-creatorcore
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
    networks:
      - integrator-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/system/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Core Integrator Main Service
  core-integrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-integrator
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - INTEGRATOR_USE_NOOPUR=false
      - USE_MONGODB=false
      - DB_PATH=db/context.db
    volumes:
      - integrator_data:/app/db
      - integrator_logs:/app/logs
    networks:
      - integrator-network
    depends_on:
      mock-creatorcore:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/system/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # MongoDB (Optional - for production)
  mongodb:
    image: mongo:7.0
    container_name: integrator-mongodb
    # No external port binding — only reachable within docker network
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=core_integrator
    volumes:
      - mongodb_data:/data/db
    networks:
      - integrator-network
    profiles:
      - production
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  noopur_data:
    driver: local
  integrator_data:
    driver: local
  integrator_logs:
    driver: local
  mongodb_data:
    driver: local

# Custom network for service communication
networks:
  integrator-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16