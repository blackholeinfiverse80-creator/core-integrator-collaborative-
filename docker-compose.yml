version: '3.8'

services:
  # Shakti / Tantra Production Suite (All services running together via Orchestrator)
  core-integrator-suite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-integrator-suite
    ports:
      - "8000:8000"  # Creator Core
      - "8001:8001"  # BHIV Core
      - "8003:8003"  # Prompt Runner
      - "8004:8004"  # Integration Bridge
      - "8005:8005"  # BHIV Bucket
      - "8006:8006"  # CET Service
      - "8007:8007"  # Sarathi Service
      - "8008:8008"  # Gate Service
    env_file:
      - .env
    environment:
      - AUTH_ENABLED=true
      - AUTH_API_KEY=prod_shakti_tantra_secret_key_2026
      - AUTH_SECRET_KEY=prod_shakti_tantra_secret_key_2026
      - DB_PATH=data/context.db
      - NONCE_DB_PATH=data/nonce_store.db
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app:/app/src:/app/creator-core/Core-Integrator-Sprint-1.1
    volumes:
      - integrator_data:/app/data
      - integrator_logs:/app/logs
    networks:
      - shakti-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/pipeline/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
      
# Volume definitions for data persistence
volumes:
  integrator_data:
    driver: local
  integrator_logs:
    driver: local

# Custom network for container separation
networks:
  shakti-network:
    driver: bridge